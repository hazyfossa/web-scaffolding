[package]
name = "web-scaffolding"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = "0.8.8"
axum-client-ip = "1.3.1"
eyre = "0.6.12"
pico-args = "0.5.0"
rust-embed = { version = "8.11.0", features = ["axum", "mime-guess"] }
serde = { version = "1.0.228", features = ["derive"] }
simple-eyre = "0.3.1"
time = "0.3.47"
tokio = { version = "1.51.1", features = ["full"] }
toml = "1.1.2"
tower = { version = "0.5.3", features = ["tokio"] }
tower-http = { version = "0.6.8", features = [
    "catch-panic",
    "compression-full",
] }
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
